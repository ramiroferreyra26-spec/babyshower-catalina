<!DOCTYPE html>
<html>
<head>
    <title>Panel Admin</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5efe9;
        }

        .card{
            border-radius:20px;
        }

        .table td, .table th{
            vertical-align: middle;
        }

        @media (max-width: 768px){
            h2{
                font-size:20px;
            }
        }
    </style>
</head>
<body>

<div class="container py-4">

    <div class="card shadow p-4">

        <h2 class="mb-3 text-center">📋 Lista de Confirmaciones</h2>

        <div class="alert alert-success text-center">
            <strong>Total de personas que asisten:</strong> {{ total }}
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-bordered text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Asistencia</th>
                        <th>Cantidad</th>
                        <th>Fecha</th>
                        <th>Eliminar</th>
                    </tr>
                </thead>

                <tbody>
                    {% for i in invitados %}
                    <tr>
                        <td>{{ i["nombre"] }} {{ i["apellido"] }}</td>

                        {% if i["asistencia"] == "Si" %}
                            <td class="text-success fw-bold">✔ Sí</td>
                        {% else %}
                            <td class="text-danger fw-bold">✘ No</td>
                        {% endif %}

                        <td>{{ i["cantidad"] }}</td>
                        <td>{{ i["fecha"] }}</td>

                        <td>
                            <form action="{{ url_for('eliminar', id=i['id']) }}" method="POST" style="display:inline;">
                                <button type="submit"
                                        class="btn btn-danger btn-sm"
                                        onclick="return confirm('¿Seguro que quieres eliminar este invitado?')">
                                    🗑
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </div>

</div>

</body>
</html>
